version = 1
name = "Local"

[setup]
script = '''
set -eu

missing_commands=""
for command_name in zsh chezmoi just gh jq; do
  if ! command -v "$command_name" >/dev/null 2>&1; then
    missing_commands="${missing_commands} ${command_name}"
  fi
done

if [ -n "$missing_commands" ]; then
  printf 'Missing required commands:%s
' "$missing_commands" >&2
  exit 1
fi'''

[[actions]]
name = "Validate"
icon = "run"
command = "chezmoi doctor && chezmoi data | jq . && just --justfile files/private_dot_config/just/justfile --list"

[[actions]]
name = "Dry Run"
icon = "run"
command = "chezmoi apply --dry-run --verbose --refresh-externals never --skip-secrets"
